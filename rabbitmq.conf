# rabbitmq.conf
deprecated_features.permit.transient_nonexcl_queues = true

# --- MQTT face for edge devices (ESP32 / Jetson) ---
mqtt.listeners.tcp.default = 1883
# Publish MQTT messages onto the app's topic exchange so existing AMQP
# consumers (sensor ingest, command, WS fan-out) receive them directly.
mqtt.exchange = main_exchange
# Allow the default 'guest' user over the docker network (dev only; production:
# a dedicated per-fleet MQTT user + ACL).
loopback_users = none
